<VirtualHost *:80>
    ServerName www.michaelnnah.com
    # Redirects all www traffic to non-www for SEO
    Redirect 301 / http://michaelnnah.com/
</VirtualHost>

<VirtualHost *:80>
    ServerAdmin contact@michaelnnah.com
    ServerName michaelnnah.com
    DocumentRoot /var/www/html

    <Directory /var/www/html/>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Troubleshooting logs - Essential for DevOps monitoring
    ErrorLog ${APACHE_LOG_DIR}/michaelnnah_error.log
    CustomLog ${APACHE_LOG_DIR}/michaelnnah_access.log combined
</VirtualHost>
