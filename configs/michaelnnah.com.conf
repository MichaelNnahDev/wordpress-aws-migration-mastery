<VirtualHost *:80>
    ServerName [www.michaelnnah.com](https://www.michaelnnah.com)
    Redirect 301 / [http://michaelnnah.com/](http://michaelnnah.com/)
</VirtualHost>

<VirtualHost *:80>
    ServerName michaelnnah.com
    DocumentRoot /var/www/html
    <Directory /var/www/html/>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>
